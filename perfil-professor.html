<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MoMo - Perfil Professor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-momo shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="home-professor.html">
            MoMo
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="home-professor.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="minhas-aulas-professor.html">
                        Minhas aulas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="cadastrar-aula.html">
                        Nova aula
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        Perfil
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- CONTEÚDO -->
<div class="container py-5">

    <div class="row g-4">

        <!-- DADOS PROFISSIONAIS -->
        <div class="col-lg-4">

            <div class="card border-0 shadow-sm profile-card p-4">

                <h3 class="fw-bold text-momo mb-4">
                    Meu Perfil
                </h3>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Nome
                    </label>

                    <input
                        type="text"
                        class="form-control momo-input"
                        value="João Oliveira"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        E-mail
                    </label>

                    <input
                        type="email"
                        class="form-control momo-input"
                        value="joao@email.com"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Telefone
                    </label>

                    <input
                        type="text"
                        class="form-control momo-input"
                        value="(19) 99999-9999"
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        CREF
                    </label>

                    <input
                        type="text"
                        class="form-control momo-input"
                        value="123456-G/SP"
                    >

                </div>

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Saldo disponível
                    </label>

                    <input
                        type="text"
                        class="form-control momo-input"
                        value="350 créditos"
                        disabled
                    >

                </div>

                <button class="btn btn-momo w-100">
                    Salvar Alterações
                </button>

            </div>

        </div>

        <!-- INFORMAÇÕES -->
        <div class="col-lg-8">

            <!-- Bio -->
            <div class="card border-0 shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">
                    Sobre mim
                </h4>

                <textarea
                    class="form-control momo-input"
                    rows="4"
                >Professor de Educação Física especializado em treinamento funcional e qualidade de vida, com foco em aulas ao ar livre e bem-estar.</textarea>

            </div>

            <!-- Modalidades -->
            <div class="card border-0 shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">
                    Modalidades oferecidas
                </h4>

                <div class="d-flex flex-wrap gap-2">

                    <span class="badge rounded-pill momo-badge">
                        Funcional
                    </span>

                    <span class="badge rounded-pill momo-badge">
                        Alongamento
                    </span>

                    <span class="badge rounded-pill momo-badge">
                        Corrida
                    </span>

                </div>

            </div>

            <!-- Resumo -->
            <div class="card border-0 shadow-sm p-4">

                <h4 class="fw-bold mb-4">
                    Resumo profissional
                </h4>

                <div class="row text-center">

                    <div class="col-md-4">

                        <h2 class="text-momo fw-bold">
                            28
                        </h2>

                        <p class="text-muted">
                            Aulas realizadas
                        </p>

                    </div>

                    <div class="col-md-4">

                        <h2 class="text-momo fw-bold">
                            12
                        </h2>

                        <p class="text-muted">
                            Alunos atendidos
                        </p>

                    </div>

                    <div class="col-md-4">

                        <h2 class="text-momo fw-bold">
                            4.9
                        </h2>

                        <p class="text-muted">
                            Avaliação média
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
