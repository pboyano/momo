<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MoMo - Editar Aula</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-momo shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="home-professor.html">
            MoMo
        </a>
        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="home-professor.html">
                        Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        Editar Aula
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-5 profile-card">

                <h2 class="fw-bold text-momo mb-4">
                    Editar Aula
                </h2>

                <form id="form-editar-aula">

                    <div class="mb-3">
                        <label for="titulo" class="form-label fw-semibold">
                            Nome da aula / Atividade
                        </label>
                        <input
                            type="text"
                            id="titulo"
                            class="form-control momo-input"
                            value="Yoga ao Ar Livre"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="modalidade" class="form-label fw-semibold">
                            Modalidade
                        </label>
                        <select id="modalidade" class="form-select momo-input" required>
                            <option value="Presencial" selected>Presencial</option>
                            <option value="Online">Online</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="data_aula" class="form-label fw-semibold">
                                Data
                            </label>
                            <input
                                type="date"
                                id="data_aula"
                                class="form-control momo-input"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="hora_aula" class="form-label fw-semibold">
                                Horário
                            </label>
                            <input
                                type="time"
                                id="hora_aula"
                                class="form-control momo-input"
                                required
                            >
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="duracao" class="form-label fw-semibold">
                                Duração (minutos)
                            </label>
                            <input
                                type="number"
                                id="duracao"
                                class="form-control momo-input"
                                value="60"
                                min="1"
                                required
                            >
                        </div>

                        <div class="col-md-8 mb-3">
                            <label for="local_aula" class="form-label fw-semibold">
                                Local / Link da Transmissão
                            </label>
                            <input
                                type="text"
                                id="local_aula"
                                class="form-control momo-input"
                                value="Parque Taquaral"
                                required
                            >
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="vagas" class="form-label fw-semibold">
                                Vagas disponíveis
                            </label>
                            <input
                                type="number"
                                id="vagas"
                                class="form-control momo-input"
                                value="10"
                                min="1"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="valor_creditos" class="form-label fw-semibold">
                                Valor (créditos)
                            </label>
                            <input
                                type="number"
                                id="valor_creditos"
                                class="form-control momo-input"
                                value="25"
                                min="0"
                                required
                            >
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="descricao" class="form-label fw-semibold">
                            Descrição
                        </label>
                        <textarea
                            id="descricao"
                            class="form-control momo-input"
                            rows="4"
                            required
                        >Aula de yoga ao ar livre voltada para relaxamento e mobilidade.</textarea>
                    </div>

                    <div class="d-flex gap-3 flex-wrap">
                        <button
                            type="submit"
                            class="btn btn-momo flex-fill"
                        >
                            Salvar Alterações
                        </button>

                        <button
                            type="button"
                            id="btn-cancelar-aula"
                            class="btn btn-outline-danger flex-fill"
                        >
                            Cancelar Aula (Excluir)
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/script.js"></script>

</body>
</html>
