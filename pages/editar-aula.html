<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MoMo - Editar Aula</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-momo shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="home-professor.html">
            MoMo
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="home-professor.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        Editar Aula
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- CONTEÚDO -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-sm p-5 profile-card">

                <h2 class="fw-bold text-momo mb-4">
                    Editar Aula
                </h2>

                <form>

                    <!-- Nome -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Nome da aula
                        </label>

                        <input
                            type="text"
                            class="form-control momo-input"
                            value="Yoga ao Ar Livre"
                        >

                    </div>

                    <!-- Modalidade -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Modalidade
                        </label>

                        <select class="form-select momo-input">

                            <option>Yoga</option>
                            <option>Funcional</option>
                            <option>Alongamento</option>
                            <option>Corrida</option>

                        </select>

                    </div>

                    <!-- Local -->
                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Local
                        </label>

                        <input
                            type="text"
                            class="form-control momo-input"
                            value="Parque Taquaral"
                        >

                    </div>

                    <!-- Data / Hora -->
                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">
                                Data
                            </label>

                            <input
                                type="date"
                                class="form-control momo-input"
                            >

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">
                                Horário
                            </label>

                            <input
                                type="time"
                                class="form-control momo-input"
                            >

                        </div>

                    </div>

                    <!-- Vagas / Valor -->
                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">
                                Vagas
                            </label>

                            <input
                                type="number"
                                class="form-control momo-input"
                                value="10"
                            >

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-semibold">
                                Valor (créditos)
                            </label>

                            <input
                                type="number"
                                class="form-control momo-input"
                                value="25"
                            >

                        </div>

                    </div>

                    <!-- Descrição -->
                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Descrição
                        </label>

                        <textarea
                            class="form-control momo-input"
                            rows="4"
                        >Aula de yoga ao ar livre voltada para relaxamento e mobilidade.</textarea>

                    </div>

                    <!-- BOTÕES -->
                    <div class="d-flex gap-3 flex-wrap">

                        <button
                            type="submit"
                            class="btn btn-momo flex-fill"
                        >
                            Salvar Alterações
                        </button>

                        <button
                            type="button"
                            class="btn btn-outline-danger flex-fill"
                        >
                            Cancelar Aula
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
