<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MoMo - Cadastro</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0 cadastro-card">

                <div class="card-body p-4">

                    <div class="text-center mb-4">
                        <h1 class="fw-bold text-momo">
                            Criar Conta
                        </h1>

                        <p class="text-muted">
                            Cadastre-se no MoMo
                        </p>
                    </div>

                    <form>

                        <div class="mb-3">
                            <label class="form-label">
                                Nome completo
                            </label>

                            <input
                                type="text"
                                class="form-control momo-input"
                                placeholder="Digite seu nome"
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                E-mail
                            </label>

                            <input
                                type="email"
                                class="form-control momo-input"
                                placeholder="Digite seu e-mail"
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Telefone
                            </label>

                            <input
                                type="tel"
                                class="form-control momo-input"
                                placeholder="(00) 00000-0000"
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Tipo de conta
                            </label>

                            <select class="form-select momo-input">
                                <option selected disabled>
                                    Selecione
                                </option>

                                <option>
                                    Aluno
                                </option>

                                <option>
                                    Professor
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Senha
                            </label>

                            <input
                                type="password"
                                class="form-control momo-input"
                                placeholder="Crie uma senha"
                            >
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                Confirmar senha
                            </label>

                            <input
                                type="password"
                                class="form-control momo-input"
                                placeholder="Confirme sua senha"
                            >
                        </div>

                        <button
                            type="submit"
                            class="btn btn-momo w-100"
                        >
                            Criar Conta
                        </button>

                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">
                            Já possui conta?

                            <a
                                href="index.html"
                                class="text-momo fw-semibold text-decoration-none"
                            >
                                Entrar
                            </a>
                        </p>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
