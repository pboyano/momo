<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MoMo - Cadastrar Aula</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-momo shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="home-professor.html">
            MoMo
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="home-professor.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        Nova Aula
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- CONTEÚDO -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0 cadastro-card">

                <div class="card-body p-5">

                    <div class="mb-4 text-center">

                        <h2 class="fw-bold text-momo">
                            Cadastrar Nova Aula
                        </h2>

                        <p class="text-muted">
                            Preencha os dados da atividade
                        </p>

                    </div>

                    <form>

                        <!-- Nome -->
                        <div class="mb-3">

                            <label class="form-label">
                                Nome da aula
                            </label>

                            <input
                                type="text"
                                class="form-control momo-input"
                                placeholder="Ex: Yoga ao ar livre"
                            >

                        </div>

                        <!-- Modalidade -->
                        <div class="mb-3">

                            <label class="form-label">
                                Categoria
                            </label>

                            <select class="form-select momo-input">

                                <option selected disabled>
                                    Selecione
                                </option>

                                <option>Yoga</option>
                                <option>Funcional</option>
                                <option>Corrida</option>
                                <option>Musculação</option>
                                <option>Pilates</option>

                            </select>

                        </div>

                        <!-- Linha -->
                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Data
                                </label>

                                <input
                                    type="date"
                                    class="form-control momo-input"
                                >

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Horário
                                </label>

                                <input
                                    type="time"
                                    class="form-control momo-input"
                                >

                            </div>

                        </div>

                        <!-- Local -->
                        <div class="mb-3">

                            <label class="form-label">
                                Local da aula
                            </label>

                            <input
                                type="text"
                                class="form-control momo-input"
                                placeholder="Ex: Parque Taquaral"
                            >

                        </div>

                        <!-- Linha -->
                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Vagas disponíveis
                                </label>

                                <input
                                    type="number"
                                    class="form-control momo-input"
                                    placeholder="10"
                                >

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Valor em saldo
                                </label>

                                <input
                                    type="number"
                                    class="form-control momo-input"
                                    placeholder="25"
                                >

                            </div>

                        </div>

                        <!-- Descrição -->
                        <div class="mb-4">

                            <label class="form-label">
                                Descrição
                            </label>

                            <textarea
                                class="form-control momo-input"
                                rows="4"
                                placeholder="Descreva a atividade..."
                            ></textarea>

                        </div>

                        <!-- Botões -->
                        <div class="d-flex gap-3">

                            <a
                                href="home-professor.html"
                                class="btn btn-outline-secondary w-50"
                            >
                                Cancelar
                            </a>

                            <button
                                type="submit"
                                class="btn btn-momo w-50"
                            >
                                Salvar Aula
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
