<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MoMo - Meu Perfil</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-momo shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="home-aluno.html">
            MoMo
        </a>
        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="home-aluno.html">
                        Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="minhas-aulas-aluno.html">
                        Minhas aulas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="saldo.html">
                        Saldo
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        Perfil
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-warning" href="../index.html">
                        Sair
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-4">

        <div class="col-lg-4">
            <div class="card border-0 shadow-sm profile-card p-4">
                <h3 class="fw-bold text-momo mb-4">
                    Meu Perfil
                </h3>

                <form id="form-perfil-aluno">
                    
                    <div class="mb-3">
                        <label for="perfil-nome" class="form-label fw-semibold">Nome</label>
                        <input
                            type="text"
                            id="perfil-nome"
                            class="form-control momo-input"
                            value="Maria Silva"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="perfil-email" class="form-label fw-semibold">E-mail</label>
                        <input
                            type="email"
                            id="perfil-email"
                            class="form-control momo-input"
                            value="maria@email.com"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="perfil-telefone" class="form-label fw-semibold">Telefone</label>
                        <input
                            type="text"
                            id="perfil-telefone"
                            class="form-control momo-input"
                            value="(19) 99999-9999"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="perfil-saldo" class="form-label fw-semibold">Saldo disponível</label>
                        <input
                            type="text"
                            id="perfil-saldo"
                            class="form-control momo-input"
                            value="120 créditos"
                            disabled
                        >
                    </div>

                    <button type="submit" class="btn btn-momo w-100">
                        Salvar Alterações
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-4 mb-4">
                <h4 class="fw-bold mb-3">
                    Atividades favoritas
                </h4>
                <div class="d-flex flex-wrap gap-2">
                    <span class="badge rounded-pill momo-badge">Yoga</span>
                    <span class="badge rounded-pill momo-badge">Funcional</span>
                    <span class="badge rounded-pill momo-badge">Alongamento</span>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-4">
                <h4 class="fw-bold mb-4">
                    Resumo das atividades
                </h4>
                <div class="row text-center">
                    
                    <div class="col-md-4">
                        <h2 class="text-momo fw-bold" id="stats-realizadas">12</h2>
                        <p class="text-muted">Aulas realizadas</p>
                    </div>

                    <div class="col-md-4">
                        <h2 class="text-momo fw-bold" id="stats-agendadas">3</h2>
                        <p class="text-muted">Agendadas</p>
                    </div>

                    <div class="col-md-4">
                        <h2 class="text-momo fw-bold" id="stats-professores">5</h2>
                        <p class="text-muted">Professores</p>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/script.js"></script>

</body>
</html>
