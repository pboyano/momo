<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>MoMo - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">

  <script src="assets/js/script.js"></script>
</head>

<body class="bg-light-purple">

  <div class="container-fluid vh-100">
    <div class="row h-100">

      <div class="col-lg-6 d-none d-lg-flex bg-momo align-items-center justify-content-center text-white p-5">
        <div class="text-center">
          <h1 class="display-3 fw-bold">MoMo</h1>
          <p class="lead">
            Move More <br>
            Encontre atividades físicas sem mensalidade.
          </p>
        </div>
      </div>

      <div class="col-lg-6 d-flex align-items-center justify-content-center">

        <div class="card shadow-lg border-0 p-4 login-card">

          <div class="text-center mb-4">
            <h2 class="fw-bold text-momo">Entrar</h2>
            <p class="text-muted">
              Acesse sua conta
            </p>
          </div>

          <form>

            <div class="mb-3">
              <label for="email" class="form-label">
                E-mail
              </label>
              <input
                type="email"
                id="email"
                class="form-control momo-input"
                placeholder="Digite seu e-mail"
                required
              >
            </div>

            <div class="mb-4">
              <label for="senha" class="form-label">
                Senha
              </label>
              <input
                type="password"
                id="senha"
                class="form-control momo-input"
                placeholder="Digite sua senha"
                required
              >
            </div>

            <button
              type="button"
              onclick="login()"
              class="btn btn-momo w-100 mb-3"
            >
              Entrar
            </button>

            <div class="text-center">
              <p class="mb-0">
                Não possui conta?
                <a href="pages/cadastro.html" class="text-momo fw-semibold text-decoration-none">
                  Criar conta
                </a>
              </p>
            </div>

          </form>

        </div>
